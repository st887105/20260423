<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車城國小｜因材網學力檢測考古題 AI 智慧補救系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary:#1e88e5; --primary-dark:#1565c0; --success:#43a047; --bg:#f4f7f6; }
        body { background:var(--bg); font-family:'Segoe UI',sans-serif; }
        .app-header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; padding:20px 0; box-shadow:0 4px 6px rgba(0,0,0,.1); margin-bottom:30px; }
        .card { border-radius:15px; border:none; box-shadow:0 6px 12px rgba(0,0,0,.05); }
        .btn-custom { border-radius:25px; padding:10px 25px; font-weight:bold; }

        /* 選項按鈕 - DOM 建立，不用 innerHTML */
        .option-btn { display:block; width:100%; padding:14px 18px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:12px; background:#fff; text-align:left; font-size:1rem; cursor:pointer; transition:all .2s; word-break:break-word; }
        .option-btn:hover { background:#f0f8ff; border-color:var(--primary); transform:translateX(3px); }
        .option-btn.selected { background:#e3f2fd; border-color:var(--primary); font-weight:bold; color:var(--primary-dark); }
        .option-prefix { display:inline-block; width:28px; height:28px; line-height:28px; text-align:center; border-radius:50%; background:#e0e0e0; font-weight:bold; margin-right:10px; font-size:.85rem; }
        .option-btn.selected .option-prefix { background:var(--primary); color:#fff; }

        /* 難度標籤 */
        .badge-easy { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
        .badge-medium { background:#fff8e1; color:#f57f17; border:1px solid #ffe082; }
        .badge-hard { background:#fce4ec; color:#c62828; border:1px solid #ef9a9a; }
        .q-type-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:bold; margin-bottom:8px; }
        .q-type-single { background:#e3f2fd; color:#1565c0; }
        .q-type-fill { background:#f3e5f5; color:#6a1b9a; }

        /* 填充題輸入 */
        .fill-input { border:2px solid #e0e0e0; border-radius:12px; padding:14px 18px; font-size:1rem; width:100%; transition:border-color .2s; }
        .fill-input:focus { border-color:var(--primary); outline:none; box-shadow:0 0 0 3px rgba(30,136,229,.15); }

        /* 題目切換動畫 */
        #question-container { animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* AI 生成進度面板 */
        .ai-panel { background:#e8f5e9; border-left:5px solid #4caf50; padding:15px; border-radius:5px; display:none; margin-top:15px; }
        .ai-progress-panel { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:16px; margin-top:12px; display:none; }
        .batch-log { max-height:150px; overflow-y:auto; font-size:.8rem; color:#555; }
        .batch-log-item { padding:3px 0; border-bottom:1px solid #f0f0f0; }
        .batch-log-item:last-child { border-bottom:none; }

        /* 計算紙 */
        #draw-panel { display:none; margin-top:15px; }
        .signature-pad { border:2px dashed #b0bec5; border-radius:10px; background:#fff; width:100%; height:280px; touch-action:none; }
        /* ── 吉祥物 ── */
        .mascot-wrap { position:relative; display:inline-block; }
        .mascot-img {
            width:90px; height:90px;
            object-fit:contain;
            border-radius:50%;
            background:#fff;
            box-shadow:0 4px 14px rgba(0,0,0,.18);
            animation: mascotBob 3s ease-in-out infinite;
        }
        @keyframes mascotBob {
            0%,100% { transform:translateY(0) rotate(-2deg); }
            50%      { transform:translateY(-8px) rotate(2deg); }
        }
        /* 標題列重新排版，讓吉祥物和文字並排 */
        .header-inner {
            display:flex; align-items:center; justify-content:center;
            gap:18px; flex-wrap:wrap;
        }
        .header-text { text-align:left; }
        .header-text h2 { font-size:1.45rem; margin:0; }
        .header-text p  { margin:4px 0 0; font-size:.88rem; opacity:.9; }

        .progress { height:10px; border-radius:10px; }
        .progress-bar { transition:width .4s ease; }

        /* ── 成績總覽表格 ── */
        .results-table th { background:#1e88e5; color:#fff; font-size:.82rem; white-space:nowrap; }
        .results-table td { font-size:.82rem; vertical-align:middle; }
        .score-high { color:#2e7d32; font-weight:bold; }
        .score-mid  { color:#f57f17; font-weight:bold; }
        .score-low  { color:#c62828; font-weight:bold; }
        .detail-row { background:#fafafa; }
        .detail-btn { cursor:pointer; font-size:.78rem; }

        /* ── 差異化分析 ── */
        .node-card { border-radius:12px; border:none; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:12px; }
        .node-bar { height:18px; border-radius:9px; background:linear-gradient(90deg,#e53935,#ef9a9a); transition:width .6s ease; }
        .node-bar-wrap { background:#f5f5f5; border-radius:9px; overflow:hidden; }

        /* ── 教學講義（列印優化）── */
        .worksheet-node-title { background:#1565c0; color:#fff; padding:8px 14px; border-radius:8px 8px 0 0; font-weight:bold; }
        .worksheet-problem { border:1px solid #e0e0e0; border-radius:0 0 8px 8px; padding:14px; margin-bottom:16px; }
        .ws-step { background:#fff8e1; border-left:4px solid #ffc107; padding:8px 12px; border-radius:4px; font-size:.88rem; margin-bottom:10px; }
        .ws-hint { background:#e3f2fd; border-left:4px solid #1e88e5; padding:6px 12px; border-radius:4px; font-size:.82rem; color:#1565c0; margin-top:8px; }
        .answer-blank { display:inline-block; min-width:80px; border-bottom:2px solid #333; margin:0 6px; }

        @media print {
            /* 隱藏所有介面元素，只保留講義 */
            .app-header, .nav-tabs, .tab-content, #view-login, #view-quiz,
            .btn, select, input, .mb-3, .alert, .ai-panel,
            .d-flex, #ai-generation-panel, #analysis-container,
            #worksheet-container > .d-flex { display:none !important; }

            /* 讓 #printable-worksheet 填滿整頁 */
            body, html { margin:0 !important; padding:0 !important; background:#fff !important; }
            #printable-worksheet {
                display:block !important;
                width:100% !important;
                margin:0 !important;
                padding:0 !important;
                font-size:11pt !important;
                color:#000 !important;
            }
            /* 確保彩色區塊在列印時也有背景色 */
            * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            .ws-node-block { page-break-inside:avoid; margin-bottom:14pt !important; }
            .ws-problem-item { page-break-inside:avoid; }
        }
    </style>
