<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車城國小｜學力檢測 AI 智慧補救系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary:#1e88e5; --primary-dark:#1565c0; --bg:#f0f4f8; }
    body { background:var(--bg); font-family:'Segoe UI','Noto Sans TC',sans-serif; display:flex; flex-direction:column; min-height:100vh; }
    main { flex:1; }

    /* Header */
    .app-header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; padding:18px 0; box-shadow:0 4px 8px rgba(0,0,0,.15); margin-bottom:28px; }
    .app-header h2 { font-size:clamp(1.1rem,3vw,1.6rem); margin-bottom:4px; }
    .app-header p  { font-size:clamp(.7rem,2vw,.85rem); opacity:.8; }

    /* Cards */
    .card { border-radius:16px; border:none; box-shadow:0 6px 18px rgba(0,0,0,.07); }

    /* 問題2修正：CSS Grid auto-fit 自動響應式 */
    .login-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,500px)); justify-content:center; gap:1.2rem; }

    /* Quiz options */
    .option-btn { display:flex; align-items:flex-start; width:100%; padding:14px 18px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:12px; background:#fff; text-align:left; font-size:1rem; cursor:pointer; transition:all .2s; }
    .option-btn:hover   { background:#f0f8ff; border-color:var(--primary); transform:translateX(3px); }
    .option-btn.selected{ background:#e3f2fd; border-color:var(--primary); font-weight:bold; color:var(--primary-dark); }
    .option-prefix { display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:28px; border-radius:50%; background:#e0e0e0; font-weight:bold; margin-right:10px; font-size:.85rem; flex-shrink:0; }
    .option-btn.selected .option-prefix { background:var(--primary); color:#fff; }
    .fill-input { border:2px solid #e0e0e0; border-radius:12px; padding:14px 18px; width:100%; font-size:1rem; transition:border-color .2s; }
    .fill-input:focus { outline:none; border-color:var(--primary); }

    /* AI generation panel */
    .ai-panel { background:#e8f5e9; border-left:5px solid #4caf50; padding:15px; border-radius:8px; display:none; margin-top:15px; }
    .ai-progress-panel { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:16px; margin-top:12px; display:none; }
    .batch-log { max-height:150px; overflow-y:auto; font-size:.8rem; color:#555; }
    .source-toggle { display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:8px; margin-bottom:12px; }
    .source-btn { padding:8px 4px; border:2px solid #e0e0e0; border-radius:10px; text-align:center; cursor:pointer; font-size:.88rem; transition:.2s; }
    .source-btn.active { border-color:var(--primary); background:#e3f2fd; color:var(--primary-dark); font-weight:bold; }
    .pdf-panel { background:#fff3e0; border-left:5px solid #ff9800; padding:12px; border-radius:5px; display:none; margin-bottom:12px; }

    /* Drawing pad */
    #draw-panel { display:none; margin-top:15px; }
    .signature-pad { border:2px dashed #b0bec5; border-radius:10px; background:#fff; width:100%; height:220px; }

    /* 問題6修正：結果頁 */
    .result-correct { background:#e8f5e9; border-left:5px solid #4caf50; padding:12px 16px; border-radius:8px; margin-bottom:10px; }
    .result-wrong   { background:#ffebee; border-left:5px solid #e53935; padding:12px 16px; border-radius:8px; margin-bottom:10px; }

    /* 差異化節點卡片 */
    .node-card { border:1px solid #dee2e6; border-radius:12px; padding:16px; margin-bottom:12px; background:#fff; }
    .node-student-tag { display:inline-block; background:#e3f2fd; color:#1565c0; border-radius:20px; padding:2px 10px; font-size:.8rem; margin:2px; }

    /* 問題7修正：錯誤率學生標記 */
    .wrong-student-badge { display:inline-block; background:#fff3e0; border:1px solid #ffcc80; color:#e65100; border-radius:6px; padding:1px 8px; font-size:.78rem; margin:2px; }

    /* 問題3修正：頁尾 */
    .app-footer { background:#1565c0; color:rgba(255,255,255,.75); text-align:center; padding:12px 0; font-size:.78rem; margin-top:40px; }
    .app-footer a { color:rgba(255,255,255,.85); text-decoration:none; }

    @media(max-width:576px) {
      .option-btn { padding:11px 14px; font-size:.92rem; }
      .source-btn { font-size:.78rem; }
    }
    @media print {
      .app-header,.nav-tabs,.tab-content,#view-login,#view-quiz,#view-result,
      .btn,select,input,.ai-panel,.app-footer { display:none !important; }
      body,html { background:#fff !important; }
      #printable-worksheet { display:block !important; width:100% !important; }
      .print-page { page-break-after:always; padding:24px; }
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    }
  </style>
</head>
<body>

<!--
  ★ 問題1修正：部署 GAS 後，將 exec 結尾的網址填入 DEFAULT_GAS_URL
  範例：'https://script.google.com/macros/s/AKfycb.../exec'
-->
<script>
  const DEFAULT_GAS_URL = '';
</script>

<header class="app-header">
  <div class="container text-center">
    <h2><i class="fa-solid fa-graduation-cap me-2"></i>車城國小｜學力檢測 AI 智慧補救系統</h2>
    <p>數學科 × 國語科 ｜ Gemini AI 差異化出題 ｜ PDF 教材出題 ｜ 弱點節點精準補救（內容僅供參考）</p>
  </div>
</header>

<main class="container-fluid px-3 px-md-4">

<!-- 登入畫面 -->
<div id="view-login">
  <div class="login-grid">
    <div class="card p-4">
      <h5 class="text-center mb-3 text-primary"><i class="fa-solid fa-user-graduate me-1"></i>學生測驗登入</h5>
      <div class="mb-3">
        <label class="form-label text-muted small fw-bold">① 選擇測驗任務</label>
        <select id="task-select" class="form-select form-select-lg" onchange="loadStudents()">
          <option>連線中，請稍候...</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small fw-bold">② 選擇姓名</label>
        <select id="student-select" class="form-select form-select-lg" disabled>
          <option>請先選擇任務</option>
        </select>
      </div>

    </div>

    <div class="card p-4">

      <div class="mb-4">
        <label class="form-label fw-bold">管理員密碼</label>
        <input type="password" id="admin-pwd" class="form-control form-control-lg"
               placeholder="預設 1234" onkeydown="if(event.key==='Enter')loginAdmin()">

</div>

          </button>
        </div>

        <ul class="nav nav-tabs mb-3 flex-nowrap overflow-auto">

          <li class="nav-item"><button class="nav-link text-nowrap"        data-bs-toggle="tab" data-bs-target="#tab-settings"><i class="fa-solid fa-gear me-1"></i>設定</button></li>

        <div class="tab-content">

                <div class="col-6 col-sm-4">

                  </select>
                </div>

                    <option value="數學">數學</option><option value="國語">國語</option>

                <div class="pdf-panel" id="pdf-panel">

                  <div id="batch-log" class="batch-log"></div>
                </div>

            </div>
          </div>

            <div id="analysis-container"></div>

<footer class="app-footer">

<script>
// ─── GAS URL 管理 ───────────────────────────────────────────────────
let GAS_API_URL = localStorage.getItem('GAS_API_URL') || DEFAULT_GAS_URL;

function saveGasUrlUi() {
  const url = document.getElementById('setting-gas-url').value.trim();
  if (!url.startsWith('http')) return Swal.fire('格式錯誤','請輸入完整的 https:// 網址','warning');
  localStorage.setItem('GAS_API_URL', url);
  GAS_API_URL = url;
  Swal.fire('成功','API 網址已更新，即將重新整理。','success').then(() => location.reload());
}

// ─── fetchAPI ───────────────────────────────────────────────────────
async function fetchAPI(action, data = {}) {
  if (!GAS_API_URL) {
    const { value: url } = await Swal.fire({
      title:'首次設定', input:'text',
      inputLabel:'請輸入 GAS Web App 網址（exec 結尾）',
      inputPlaceholder:'https://script.google.com/macros/s/.../exec',
      allowOutsideClick:false, confirmButtonText:'確定',
      inputValidator: v => !v.includes('exec') ? '網址格式不正確' : null
    });
    if (!url) throw new Error('未設定 API 網址');
    localStorage.setItem('GAS_API_URL', url);
    GAS_API_URL = url;
  }
  const resp   = await fetch(GAS_API_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ action, data })
  });
  const result = await resp.json();
  if (result.status === 'success') return result.data;
  throw new Error(result.message);
}

// ─── API 物件 ────────────────────────────────────────────────────────
const API = {
  getTasks:                  ()               => fetchAPI('getTasks'),
  getStudents:               t                => fetchAPI('getStudents',             {taskName:t}),
  generateQuiz:              (n,t)            => fetchAPI('generateQuiz',            {weakNode:n, taskName:t}),
  submitQuizResult:          d                => fetchAPI('submitQuizResult',        {payload:d}),
  verifyAdmin:               p                => fetchAPI('verifyAdmin',             {pwd:p}),
  uploadTaskData:            (n,g,s,d,nd)     => fetchAPI('uploadTaskData',          {taskName:n, grade:g, subject:s, studentData:d, uniqueNodes:nd}),
  setupDatabase:             ()               => fetchAPI('setupDatabase'),
  generateBatch:             (nd,g,s,i)       => fetchAPI('generateBatch',           {nodesArray:nd, grade:g, subject:s, batchIndex:i}),
  generateBatchFromFolder:   (fid,nd,g,s,i,m) => fetchAPI('generateBatchFromFolder', {folderId:fid, nodesArray:nd, grade:g, subject:s, batchIndex:i, mode:m}),
  scanFolder:                fid              => fetchAPI('scanFolder',              {folderId:fid}),
  getQuizSettings:           ()               => fetchAPI('getQuizSettings'),
  updateQuizSettings:        c                => fetchAPI('updateQuizSettings',      {count:c}),

// ─── 問題6.5修正：Factory Function（資料反正規化）────────────────────
// 統一由此函數產生作答紀錄，node 欄位永遠存在，後端分析不再需要補查
function createAnswerDetail(question, userAnswer) {
  const normUser    = normalizeAns(userAnswer);
  const normCorrect = normalizeAns(question.answer);
  const isCorrect   = normUser !== '' && normUser === normCorrect;
  return {
    id:               question.id || '',
    node:             question.node || 'unknown', // ★ 資料反正規化，永遠帶 node
    questionText:     question.text || '',
    type:             question.type || 'single',
    options:          question.options || [],
    userAns:          userAnswer || '',
    correctAns:       normCorrect,
    displayCorrectAns: question.displayAnswer || question.answer || '',
    hint:             question.hint || '',  // ★ 保存 hint 供答錯時顯示
    isCorrect
  };
}

function normalizeAns(s) {
  if (s === null || s === undefined) return '';
  return String(s).trim()
    .replace(/\s+/g,'')
    .replace(/[\uff10-\uff19]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/，/g,',').toLowerCase();
}

// ★ Issue1：姓名去識別化（中間字元→O）
function maskName(name) {
  if (!name) return '';
  if (name.length <= 1) return name;
  if (name.length === 2) return name[0] + 'O';
  // 長度3以上：保留首尾，中間全換 O
  return name[0] + 'O'.repeat(name.length - 2) + name[name.length - 1];
}

function renderQuestion() {
  const q = currentQuestions[currentQIndex];
  const n = currentQuestions.length;
  document.getElementById('quiz-progress').style.width = Math.round(((currentQIndex+1)/n)*100) + '%';

  const diffColor = {easy:'#e8f5e9', medium:'#fff8e1', hard:'#ffebee'}[q.difficulty] || '#f5f5f5';
  const diffText  = {easy:'#388e3c', medium:'#f57f17', hard:'#c62828'}[q.difficulty] || '#666';
  const diffLabel = {easy:'易', medium:'中', hard:'難'}[q.difficulty] || q.difficulty;
  const typeLabel = {single:'選擇題', fill:'填充題'}[q.type] || q.type;

  const LABELS = ['A','B','C','D','E','F'];
  let optionsHtml = '';
  if (q.type === 'single') {
    optionsHtml = (q.options||[]).map((opt, i) => {
      const sel = userAnswers[currentQIndex] === opt ? 'selected' : '';
      return `<button class="option-btn ${sel}" onclick="selectOption(${currentQIndex},${JSON.stringify(opt)},this)">
        <span class="option-prefix">${LABELS[i]||i+1}</span>${opt}
      </button>`;
    }).join('');
  } else {
    const val = userAnswers[currentQIndex] || '';
    optionsHtml = `<input class="fill-input" id="fill-input" type="text" placeholder="請輸入答案" value="${val}"
      oninput="userAnswers[${currentQIndex}]=this.value" onkeydown="if(event.key==='Enter')navQuestion(1)">`;
  }

  document.getElementById('question-container').innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-1">
      <span class="text-muted small">第 ${currentQIndex+1} / ${n} 題</span>
      <span class="badge" style="background:${diffColor};color:${diffText};border:1px solid ${diffText}44">
        ${typeLabel} ｜ ${diffLabel}
      </span>
    </div>
    <div class="fw-bold mb-3" style="font-size:1.05rem;line-height:1.7">${currentQIndex+1}. ${q.text}</div>
    ${optionsHtml}`;

  if (q.type === 'fill') setTimeout(() => document.getElementById('fill-input')?.focus(), 80);
  document.getElementById('btn-prev').disabled    = currentQIndex === 0;
  document.getElementById('btn-next').style.display   = currentQIndex < n-1 ? '' : 'none';
  document.getElementById('btn-submit').style.display  = currentQIndex === n-1 ? '' : 'none';
}

function selectOption(idx, value, btn) {
  userAnswers[idx] = value;
  btn.closest('#question-container').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function navQuestion(dir) {
  currentQIndex = Math.max(0, Math.min(currentQuestions.length-1, currentQIndex+dir));
  renderQuestion();
}

// ─── 交卷 ─────────────────────────────────────────────────────────────
async function submitQuiz() {
  const unanswered = currentQuestions.filter((_,i) => userAnswers[i] === undefined || userAnswers[i] === '').length;
  if (unanswered > 0) {
    const { isConfirmed } = await Swal.fire({
      title:`還有 ${unanswered} 題未作答`, text:'確定要交卷嗎？', icon:'question',
      showCancelButton:true, confirmButtonText:'確定交卷', cancelButtonText:'繼續作答'
    });
    if (!isConfirmed) return;
  }

  stopTimer();
  const timeSpent = Math.round((Date.now()-startTime)/1000);

  // ★ 使用 Factory Function 產生詳細記錄（含 node 欄位，資料反正規化）
  const details = currentQuestions.map((q,i) => createAnswerDetail(q, userAnswers[i]));
  const correct = details.filter(d => d.isCorrect).length;
  const score   = Math.round((correct/currentQuestions.length)*100);

  const stu      = window._studentList[parseInt(document.getElementById('student-select').value)] || {};
  const taskName = document.getElementById('task-select').value;

  Swal.fire({title:'送出中...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
  try {
    await API.submitQuizResult({ taskName, seatNo:stu.seatNo, name:stu.name, score, timeSpent, details });
    Swal.close();
    showStudentResult(score, correct, currentQuestions.length, timeSpent, details);
  } catch(e) { Swal.fire('錯誤','送出失敗：'+e.message,'error'); }
}

// 問題6修正：顯示詳細作答結果
function showStudentResult(score, correct, total, timeSpent, details) {
  const emoji = score>=90?'🏆':score>=70?'👍':score>=60?'😊':'💪';
  const color = score>=70 ? '#2e7d32' : '#c62828';
  const mins  = Math.floor(timeSpent/60), secs = timeSpent%60;

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score-text').innerHTML =
    `得分：<span style="color:${color}">${score} 分</span>（答對 ${correct}/${total} 題）`;
  document.getElementById('result-time-text').textContent = `作答時間：${mins}分${secs}秒`;

  const LABELS = ['A','B','C','D','E'];
  let html = '';
  details.forEach((d,i) => {
    const cls = d.isCorrect ? 'result-correct' : 'result-wrong';
    let userDisplay = d.userAns || '（未作答）';
    if (d.type==='single' && d.options && d.options.length>0) {
      const idx = d.options.indexOf(d.userAns);
      if (idx>=0) userDisplay = `${LABELS[idx]}. ${d.userAns}`;
    }
    let wrongHint = '';
    if (!d.isCorrect) {
      // 顯示解題 hint（若題目有附）
      const hintHtml = d.hint ? `<div class="mt-1 small" style="color:#7b1fa2">💡 提示：${d.hint}</div>` : '';
      let ca = d.displayCorrectAns || d.correctAns;
      if (d.type==='single' && d.options && d.options.length>0) {
        const ci = d.options.indexOf(ca);
        if (ci>=0) ca = `${LABELS[ci]}. ${ca}`;
      }
      wrongHint = hintHtml + `<div class="mt-1 small text-success">✔ 正確答案：<strong>${ca}</strong></div>`;
    }
    html += `<div class="${cls}">
      <div><span class="me-1">${d.isCorrect?'✅':'❌'}</span><strong>第${i+1}題</strong>
        <span class="badge bg-light text-muted ms-1 small">${d.node||''}</span>
      </div>
      <div class="small mt-1 text-muted">${d.questionText}</div>
      <div class="small mt-1">您的答案：<strong>${userDisplay}</strong></div>
      ${wrongHint}
    </div>`;
  });
  document.getElementById('result-details-container').innerHTML = html;
  switchView('view-result');
}

// ─── 問題8修正：差異化分析頁 ─────────────────────────────────────────
async function loadClassAnalysis() {
  const taskName = document.getElementById('analysis-task-select').value;
  const el = document.getElementById('analysis-container');
  const ws = document.getElementById('worksheet-container');
  if (!taskName) { el.innerHTML=''; ws.style.display='none'; return; }
  el.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary"></div></div>';
  ws.style.display='none'; _worksheetCache=null;

  try {
    // ★ 同時抓弱點節點與各題錯誤率，用以在節點卡片顯示具體題目
    const [nodes, qErrors] = await Promise.all([
      API.analyzeClassWeakNodes(taskName),
      API.getQuestionErrorRates(taskName)
    ]);
    if (!nodes.length) {
      el.innerHTML='<p class="text-muted">尚無足夠資料。請先讓學生完成測驗，且題目需包含知識節點資訊。</p>';
      return;
    }
    const task = (_allTasks||[]).find(t=>t.name===taskName)||{};
    _analysisCache = { grade:task.grade||'五年級', subject:task.subject||'數學', nodes:nodes.map(n=>n.node) };

    // 建立 node → 錯題清單 對照表
    const nodeQuestions = {};
    qErrors.forEach(q => {
      if (q.node) {
        if (!nodeQuestions[q.node]) nodeQuestions[q.node]=[];
        nodeQuestions[q.node].push(q);
      }
    });

    let html = '';
    nodes.forEach((n,i) => {
      const bc = n.wrongRate>=70?'#e53935':n.wrongRate>=40?'#fb8c00':'#43a047';
      const tags = n.students.map(s=>`<span class="node-student-tag">${s}</span>`).join('');
      // 嘗試精確比對，若無則模糊比對（部分包含）
      const exactMatch = nodeQuestions[n.node] || [];
      const fuzzyMatch = exactMatch.length === 0
        ? qErrors.filter(q => q.node && (
            q.node.includes(n.node) || n.node.includes(q.node) ||
            q.questionText.includes(n.node)
          ))
        : [];
      const relQs = (exactMatch.length ? exactMatch : fuzzyMatch).slice(0,5);
      const qRows = relQs.map((q,qi)=>
        `<div class="mb-2 p-2" style="background:#fafafa;border-radius:6px;font-size:.82rem;border-left:3px solid ${q.wrongRate>=70?'#e53935':'#fb8c00'}">
          <strong>${qi+1}.</strong>（錯誤率 ${q.wrongRate}%）${q.questionText}
          <div class="text-success small">✔ 答案：${q.correctAns}</div>
         </div>`
      ).join('');
      const qHtml = relQs.length
        ? `<details class="mt-2"><summary class="small text-primary" style="cursor:pointer;user-select:none">
            📋 該節點相關錯題（${relQs.length} 題）</summary>
            <div class="mt-2">${qRows}</div></details>`
        : '';
      html += `<div class="node-card">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-1 mb-2">
          <div><span class="badge bg-danger me-2">#${i+1}</span><span class="node-title">${n.node}</span></div>
          <div class="text-end">
            <strong style="color:${bc}">${n.wrongRate}%</strong>
            <div class="small text-muted">${n.wrongCount}/${n.studentCount}人答錯</div>
          </div>
        </div>
        <div class="progress mb-2" style="height:6px"><div class="progress-bar" style="width:${n.wrongRate}%;background:${bc}"></div></div>
        <div class="small text-muted mb-1">需加強的學生：</div>${tags}
        ${qHtml}
      </div>`;
    });
    el.innerHTML = html;
    ws.style.display='';
    document.getElementById('btn-print-teacher').disabled=true;
    document.getElementById('btn-print-student').disabled=true;
    document.getElementById('worksheet-content').innerHTML='';
  } catch(e) { el.innerHTML=`<p class="text-danger">${e.message}</p>`; }
}

async function generateWorksheet() {
  if (!_analysisCache.nodes.length) return Swal.fire('提示','請先載入差異化分析','info');
  const btn = document.querySelector('#worksheet-container .btn-success');
  btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span>生成中...';
  document.getElementById('worksheet-content').innerHTML='';
  try {
    const items = await API.generateTeachingWorksheet(_analysisCache.nodes.slice(0,5), _analysisCache.grade, _analysisCache.subject);
    _worksheetCache = items;
    renderWorksheet(items, true);
    document.getElementById('btn-print-teacher').disabled=false;
    document.getElementById('btn-print-student').disabled=false;
  } catch(e) { document.getElementById('worksheet-content').innerHTML=`<p class="text-danger">${e.message}</p>`; }
  finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-wand-magic-sparkles me-1"></i>重新生成'; }
}

function renderWorksheet(items, showAnswers) {
  const grouped={};
  items.forEach(q=>{if(!grouped[q.node])grouped[q.node]=[];grouped[q.node].push(q);});
  let html='<div class="border rounded p-3 bg-white">';
  Object.entries(grouped).forEach(([node,qs],gi)=>{
    html+=`<div class="mb-4"><h6 class="fw-bold" style="background:#e3f2fd;padding:6px 12px;border-radius:6px;color:#1565c0">節點 ${gi+1}：${node}</h6>`;
    qs.forEach((q,qi)=>{
      html+=`<div class="mb-3 ps-2">
        <div class="mb-1"><strong>${qi+1}.</strong> ${q.text}</div>
        <div class="small text-info mb-1">💡 引導：${q.step}</div>
        <div class="small text-warning mb-1">🔑 提示：${q.hint}</div>
        ${showAnswers?`<div class="small text-success fw-bold">✅ 解答：${q.answer}</div>`:'<div class="border-bottom" style="margin-top:18px"></div>'}
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('worksheet-content').innerHTML=html;
}

function printWorksheet(withAnswers) {
  if (!_worksheetCache) return;
  const grouped={};
  _worksheetCache.forEach(q=>{if(!grouped[q.node])grouped[q.node]=[];grouped[q.node].push(q);});
  const taskName = document.getElementById('analysis-task-select').value;
  let html=`<div class="print-page"><h3 style="text-align:center;margin-bottom:4px">車城國小 AI 補救學習講義</h3>
    <p style="text-align:center;font-size:.9em;color:#666">任務：${taskName} ｜ ${_analysisCache.subject} ｜ ${_analysisCache.grade} ｜ ${withAnswers?'教師版（含解答）':'學生版'}</p><hr>`;
  Object.entries(grouped).forEach(([node,qs],gi)=>{
    html+=`<h4>◆ 節點 ${gi+1}：${node}</h4>`;
    qs.forEach((q,qi)=>{
      html+=`<p><strong>${qi+1}. ${q.text}</strong></p>
        <p style="color:#0277bd;font-size:.9em">引導：${q.step}</p>
        <p style="color:#f57f17;font-size:.9em">提示：${q.hint}</p>
        ${withAnswers?`<p style="color:#2e7d32;font-size:.9em">解答：${q.answer}</p>`:'<div style="border-bottom:1px solid #ccc;height:30px;margin:8px 0"></div>'}`;
    });
  });
  html+='</div>';
  const pa=document.getElementById('printable-worksheet');
  pa.innerHTML=html; pa.style.display='block';
  setTimeout(()=>{window.print(); pa.style.display='none';},200);
}

async function processExcel() {
  const taskName = document.getElementById('new-task-name').value.trim();
  const grade    = document.getElementById('task-grade').value;
  const subject  = document.getElementById('task-subject').value;
  const file     = document.getElementById('excel-file').files[0];
  if (!taskName) return Swal.fire('提示','請填寫任務名稱','info');
  if (!file)     return Swal.fire('提示','請選擇 Excel 檔案','info');

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const wb  = XLSX.read(e.target.result, {type:'binary'});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (!raw.length) return Swal.fire('錯誤','Excel 內容為空','error');

      const row1    = raw[0] || [];
      // 格式A：學力檢測匯出（第1欄標題為「學生」，3行標題）
      const isTypeA = String(row1[0]||'').trim() === '學生';

      const studentData=[], nodeSet=new Set();

      if (isTypeA) {
        // 找出所有節點欄（row1 中含 '/' 的欄），節點答對率在 colIdx+7
        const nodeColMap = [];
        row1.forEach((cell, i) => {
          const s = String(cell||'');
          if (s.includes('/') && s.length > 3)
            nodeColMap.push({ colIdx: i+7, nodeName: s.split('/').pop().trim() });
        });

        raw.slice(3).forEach(row => {                        // 跳過3行標題
          const sc = String(row[0]||'').trim();
          if (!sc) return;
          const m = sc.match(/(\d+)\s*號\s*(.+)$/);         // 解析「X號 姓名」
          if (!m) return;
          const seatNo = m[1].trim(), name = m[2].trim();
          const overallAcc = row[3] !== '' ? String(row[3]) : '';
          // 弱點 = 答對率 < 60
          const weakList = nodeColMap
            .filter(nc => { const a=parseFloat(row[nc.colIdx]); return !isNaN(a) && a < 60; })
            .map(nc => nc.nodeName);
          nodeColMap.forEach(nc => {
            const a=parseFloat(row[nc.colIdx]);
            if (!isNaN(a)) nodeSet.add(nc.nodeName);
          });
          studentData.push({ seatNo, name, accuracy: overallAcc, weakNodes: weakList.join('、') });
        });

      } else {
        // 格式B：一般格式（含「姓名」欄）
        const nameIdx = row1.findIndex(h=>String(h).includes('姓名'));
        const seatIdx = row1.findIndex(h=>String(h).includes('座'));
        const accIdx  = row1.findIndex(h=>String(h).includes('答對率')||String(h).includes('準確'));
        const nodeIdx = row1.findIndex(h=>String(h).includes('弱點')||String(h).includes('節點'));
        if (nameIdx<0) return Swal.fire('格式錯誤','Excel 需有「姓名」欄，或使用學力檢測匯出格式','error');
        raw.slice(1).forEach(row=>{
          const name=String(row[nameIdx]||'').trim();
          if (!name) return;
          const seat  = seatIdx>=0 ? String(row[seatIdx]||'') : '';
          const acc   = accIdx>=0  ? String(row[accIdx]||'')  : '';
          const nodes = nodeIdx>=0 ? String(row[nodeIdx]||'') : '';
          studentData.push({seatNo:seat, name, accuracy:acc, weakNodes:nodes});
          nodes.split(/[,，、\s]+/).map(n=>n.trim()).filter(n=>n&&/\d/.test(n)).forEach(n=>nodeSet.add(n));
        });
      }

      if (!studentData.length) return Swal.fire('錯誤','解析不到學生資料','error');
      globalUniqueNodes = Array.from(nodeSet);
      document.getElementById('weak-count').textContent = globalUniqueNodes.length;

      Swal.fire({title:'上傳中...', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
      await API.uploadTaskData(taskName, grade, subject, studentData, globalUniqueNodes);

      // 問題4修正：同步資料夾 ID
      const fid = await API.getFolderId();
      if (fid) document.getElementById('pdf-folder-id').value=fid;

      _allTasks = await API.getTasks();
      refreshAllTaskSelects();
      Swal.fire('成功',`已建立「${taskName}」，共 ${studentData.length} 位學生，${globalUniqueNodes.length} 個弱點節點`,'success');
      document.getElementById('ai-generation-panel').style.display='block';
    } catch(err) { Swal.fire('錯誤','解析失敗：'+err.message,'error'); }
  };
  reader.readAsBinaryString(file);
}

async function triggerAIGeneration() {
  if (!globalUniqueNodes.length) return Swal.fire('提示','請先解析 Excel','info');
  const btn = document.getElementById('btn-ai-generate');
  btn.disabled=true;
  document.getElementById('ai-progress-panel').style.display='block';

  const grade   = document.getElementById('task-grade').value;
  const subject = document.getElementById('task-subject').value;
  const fid     = document.getElementById('pdf-folder-id').value.trim();
  // ★ 每批改為3個節點，減少單次 Prompt 長度，降低超時機率
  const BATCH_SIZE=3, total=Math.ceil(globalUniqueNodes.length/BATCH_SIZE);
  let idx=0, retryCount=0, MAX_RETRY=4;
  const logEl = document.getElementById('batch-log');
  logEl.innerHTML='';

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  const next=async()=>{
    document.getElementById('progress-title').textContent=
      retryCount>0
        ? `⏳ 第 ${idx+1}/${total} 批重試中（第${retryCount}次）...`
        : `命題中：第 ${idx+1}/${total} 批`;
    try {
      let res;
      if (currentSource!=='ai'&&fid) res=await API.generateBatchFromFolder(fid, globalUniqueNodes, grade, subject, idx, currentSource);
      else res=await API.generateBatch(globalUniqueNodes, grade, subject, idx);

      retryCount=0; // 成功後重置重試計數
      document.getElementById('ai-progress-bar').style.width=Math.round(((idx+1)/total)*100)+'%';
      logEl.innerHTML=`<div>${res.message}</div>`+logEl.innerHTML;
      idx++;
      if (!res.done&&idx<total) setTimeout(next, 1200);
      else { Swal.fire('完成🎉',`題庫擴充完成！共 ${total} 批`,'success'); btn.disabled=false; document.getElementById('progress-title').textContent='完成！'; }
    } catch(e) {
      const isRetryable = /high demand|quota|503|overload|unavailable/i.test(e.message);
      if (isRetryable && retryCount < MAX_RETRY) {
        retryCount++;
        const wait = retryCount * 15; // 15、30、45、60 秒遞增等待
        logEl.innerHTML=`<div class="text-warning">⚠️ 第${idx+1}批遇到流量限制，${wait}秒後自動重試（${retryCount}/${MAX_RETRY}）...</div>`+logEl.innerHTML;
        document.getElementById('progress-title').textContent=`等待重試 ${wait}s...`;
        await sleep(wait * 1000);
        next(); // 不遞增 idx，重試同一批
      } else {
        logEl.innerHTML=`<div class="text-danger">❌ 第${idx+1}批失敗：${e.message}</div>`+logEl.innerHTML;
        // 跳過此批繼續下一批，不中斷整體流程
        retryCount=0; idx++;
        if (idx < total) {
          await sleep(3000);
          next();
        } else {
          Swal.fire('部分完成','有批次失敗，其餘已完成，可再次點擊補充','warning');
          btn.disabled=false;
        }
      }
    }
  };
  next();
}
