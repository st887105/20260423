<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車城國小｜因材網學力檢測 AI 智慧補救系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#1e88e5;--primary-dark:#1565c0;--success:#43a047;--bg:#f4f7f6;--math:#1e88e5;--chinese:#e53935;}
        body{background:var(--bg);font-family:'Segoe UI',sans-serif;}
        .app-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:20px 0;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:30px;}
        .card{border-radius:15px;border:none;box-shadow:0 6px 12px rgba(0,0,0,.05);}
        .btn-custom{border-radius:25px;padding:10px 25px;font-weight:bold;}
        .option-btn{display:block;width:100%;padding:14px 18px;margin-bottom:10px;border:2px solid #e0e0e0;border-radius:12px;background:#fff;text-align:left;font-size:1rem;cursor:pointer;transition:all .2s;}
        .option-btn:hover{background:#f0f8ff;border-color:var(--primary);transform:translateX(3px);}
        .option-btn.selected{background:#e3f2fd;border-color:var(--primary);font-weight:bold;color:var(--primary-dark);}
        .option-prefix{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:50%;background:#e0e0e0;font-weight:bold;margin-right:10px;font-size:.85rem;}
        .option-btn.selected .option-prefix{background:var(--primary);color:#fff;}
        .badge-easy{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
        .badge-medium{background:#fff8e1;color:#f57f17;border:1px solid #ffe082;}
        .badge-hard{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;}
        .q-type-single{background:#e3f2fd;color:#1565c0;padding:3px 10px;border-radius:20px;font-size:.75rem;}
        .q-type-fill{background:#f3e5f5;color:#6a1b9a;padding:3px 10px;border-radius:20px;font-size:.75rem;}
        .fill-input{border:2px solid #e0e0e0;border-radius:12px;padding:14px 18px;width:100%;}
        .ai-panel{background:#e8f5e9;border-left:5px solid #4caf50;padding:15px;border-radius:5px;display:none;margin-top:15px;}
        .ai-progress-panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-top:12px;display:none;}
        .batch-log{max-height:150px;overflow-y:auto;font-size:.8rem;color:#555;}
        #draw-panel{display:none;margin-top:15px;}
        .signature-pad{border:2px dashed #b0bec5;border-radius:10px;background:#fff;width:100%;height:280px;}
        .badge-math{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}
        .badge-chinese{background:#fce4ec;color:#c62828;border:1px solid #f48fb1;}
        .source-toggle{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
        .source-btn{flex:1;min-width:120px;padding:8px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;cursor:pointer;font-size:0.9rem;}
        .source-btn.active{border-color:var(--primary);background:#e3f2fd;color:var(--primary-dark);font-weight:bold;}
        .pdf-panel{background:#fff3e0;border-left:5px solid #ff9800;padding:12px;border-radius:5px;display:none;margin-bottom:12px;}
        @media print{
            .app-header,.nav-tabs,.tab-content,#view-login,#view-quiz,.btn,select,input,.mb-3,.alert,.ai-panel,.d-print-none{display:none !important;}
            body,html{background:#fff!important;}
            #printable-worksheet{display:block!important;width:100%!important;color:#000!important;}
            *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
        }
    </style>
</head>
<body>
<div class="app-header">
    <div class="d-flex justify-content-center align-items-center flex-wrap gap-3">
        <div>
            <h2 class="mb-1"><i class="fa-solid fa-graduation-cap"></i> 車城國小｜學力檢測AI智慧補救系統</h2>
            <p class="mb-0 small opacity-75">數學科×國語科|Gemini AI差異化出題|PDF教材出題|弱點節點精準補救</p>
        </div>
    </div>
</div>

<div class="container">

<div id="view-login" class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <ul class="nav nav-pills mb-4 justify-content-center">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#student-login">學生測驗登入</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#teacher-login">教師管理後台</button></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="student-login">
                    <div class="mb-3">
                        <label class="form-label text-muted">1. 選擇測驗任務</label>
                        <select id="task-select" class="form-select form-select-lg" onchange="loadStudents()"><option>載入中...</option></select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">2. 選擇姓名</label>
                        <select id="student-select" class="form-select form-select-lg" disabled><option>請先選擇任務</option></select>
                    </div>
                    <button class="btn btn-primary w-100 btn-lg btn-custom" onclick="startQuiz()">開始挑戰 <i class="fa-solid fa-rocket"></i></button>
                </div>
                <div class="tab-pane fade" id="teacher-login">
                    <div class="mb-4">
                        <label class="form-label">管理員密碼</label>
                        <input type="password" id="admin-pwd" class="form-control form-control-lg" placeholder="預設 1234">
                    </div>
                    <button class="btn btn-success w-100 btn-lg btn-custom" onclick="loginAdmin()">登入後台 <i class="fa-solid fa-user-tie"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="view-admin" class="row justify-content-center" style="display:none;">
    <div class="col-md-10">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h4 class="mb-0"><i class="fa-solid fa-chalkboard-user"></i> 教師管理儀表板</h4>
                <button class="btn btn-outline-primary btn-sm" onclick="switchView('view-login')"><i class="fa-solid fa-house"></i> 回首頁</button>
            </div>
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-upload"><i class="fa-solid fa-upload"></i> 建立任務</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-results" onclick="loadAdminResults()"><i class="fa-solid fa-user-check"></i> 成績</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-qerror" onclick="loadQuestionErrors()"><i class="fa-solid fa-circle-xmark"></i> 錯誤率</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-analysis" onclick="loadClassAnalysis()"><i class="fa-solid fa-chart-pie"></i> 差異化分析</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-settings"><i class="fa-solid fa-gear"></i> 設定</button></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-upload">
                    <div class="card bg-light p-3">
                        <div class="row g-2 mb-3">
                            <div class="col-5"><input type="text" id="new-task-name" class="form-control" placeholder="任務名稱 (例: 五甲補救)"></div>
                            <div class="col-4"><select id="task-grade" class="form-select"><option value="三年級">三年級</option><option value="四年級">四年級</option><option value="五年級" selected>五年級</option><option value="六年級">六年級</option></select></div>
                            <div class="col-3"><select id="task-subject" class="form-select"><option value="數學">數學</option><option value="國語">國語</option></select></div>
                        </div>
                        <input type="file" id="excel-file" class="form-control mb-3" accept=".xlsx,.xls">
                        <button class="btn btn-primary w-100 mb-2" onclick="processExcel()">解析名單與弱點</button>
                        
                        <div id="ai-generation-panel" class="ai-panel">
                            <h6 class="text-success"><i class="fa-solid fa-robot"></i> 發現全班共有 <span id="weak-count">0</span> 個弱點節點</h6>
                            
                            <div class="source-toggle mt-3">
                                <div class="source-btn active" id="src-btn-ai" onclick="switchSource('ai')">🤖 純 AI 擴充</div>
                                <div class="source-btn" id="src-btn-pdf" onclick="switchSource('pdf')">📄 限定 PDF 擴充</div>
                                <div class="source-btn" id="src-btn-mixed" onclick="switchSource('mixed')">✨ 混合 (AI+PDF)</div>
                            </div>
                            
                            <div class="pdf-panel" id="pdf-panel">
                                <div class="input-group input-group-sm mb-2">
                                    <input type="text" id="pdf-folder-id" class="form-control" placeholder="貼上 Google Drive 資料夾 ID">
                                    <button class="btn btn-outline-warning" onclick="scanPdfFolder()">掃描</button>
                                </div>
                                <div id="folder-scan-result" class="small fw-bold text-success mt-2"></div>
                            </div>
                            <button id="btn-ai-generate" class="btn btn-success w-100 mt-2" onclick="triggerAIGeneration()">開始擴充題庫</button>
                            <div class="ai-progress-panel" id="ai-progress-panel">
                                <div id="progress-title" class="small fw-bold text-success mb-1">命題中...</div>
                                <div class="progress mb-2"><div id="ai-progress-bar" class="progress-bar progress-bar-animated bg-success" style="width:0%"></div></div>
                                <div id="batch-log" class="batch-log"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="tab-results">
                    <select id="results-task-select" class="form-select mb-3" onchange="loadAdminResults()"><option value="">選擇任務</option></select>
                    <div id="results-table-container"></div>
                </div>
                <div class="tab-pane fade" id="tab-qerror">
                    <select id="qerror-task-select" class="form-select mb-3" onchange="loadQuestionErrors()"><option value="">選擇任務</option></select>
                    <div id="qerror-container"></div>
                </div>
                <div class="tab-pane fade" id="tab-analysis">
                    <select id="analysis-task-select" class="form-select mb-3" onchange="loadClassAnalysis()"><option value="">選擇任務</option></select>
                    <div id="analysis-container"></div>
                    <div id="worksheet-container" style="display:none;" class="mt-4 border-top pt-3">
                        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                            <h6 class="fw-bold mb-0"><i class="fa-solid fa-file-lines"></i> AI 生成教學講義</h6>
                            <div>
                                <button class="btn btn-sm btn-outline-primary me-2" onclick="printWorksheet(true)"><i class="fa-solid fa-print"></i> 列印教師版(含解答)</button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="printWorksheet(false)"><i class="fa-solid fa-print"></i> 列印學生版(無解答)</button>
                            </div>
                        </div>
                        <div id="worksheet-content"></div>
                    </div>
                </div>
                <div class="tab-pane fade" id="tab-settings">
                    <div class="card bg-light p-3">
                        <div class="mb-3">
                            <label class="form-label text-muted small">學生測驗題數</label>
                            <div class="input-group"><input type="number" id="setting-quiz-count" class="form-control" value="10"><button class="btn btn-primary" onclick="saveSettings('updateQuizSettings', 'setting-quiz-count')">儲存</button></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">PDF 教材資料夾 ID</label>
                            <div class="input-group"><input type="text" id="setting-folder-id" class="form-control"><button class="btn btn-warning" onclick="saveSettings('updateFolderId', 'setting-folder-id')">儲存</button></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">GAS API 網址</label>
                            <div class="input-group"><input type="text" id="setting-gas-url" class="form-control" placeholder="https://script.google.com/.../exec"><button class="btn btn-danger" onclick="saveGasUrlUi()">更新</button></div>
                        </div>
                        <button class="btn btn-outline-secondary w-100 mb-2" onclick="API.setupDatabase()">初始化資料庫</button>
                        <button class="btn btn-outline-danger w-100" onclick="API.clearBankCache().then(m=>Swal.fire('完成',m,'success'))">清除題庫快取</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="view-quiz" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 id="quiz-student-name" class="text-primary fw-bold mb-0"></h5>
        <span class="badge bg-warning text-dark fs-6" id="timer">00:00</span>
    </div>
    <div class="progress mb-4"><div id="quiz-progress" class="progress-bar bg-success" style="width:0%"></div></div>
    <div class="card p-4 shadow-sm">
        <div id="question-container"></div>
        <div class="mt-3 text-end"><button class="btn btn-outline-info btn-sm" onclick="toggleCanvas()">計算紙</button></div>
        <div id="draw-panel"><canvas id="signature-pad" class="signature-pad"></canvas><button class="btn btn-light btn-sm mt-2" onclick="sigPad.clear()">清除</button></div>
        <div class="d-flex justify-content-between mt-4">
            <button class="btn btn-secondary px-4" id="btn-prev" onclick="navQuestion(-1)" disabled>上一題</button>
            <button class="btn btn-primary px-4" id="btn-next" onclick="navQuestion(1)">下一題</button>
            <button class="btn btn-success px-4" id="btn-submit" onclick="submitQuiz()" style="display:none;">交卷</button>
        </div>
    </div>
</div>
</div>

<script>
// ================================================================
// GAS 部署為網頁應用程式的 URL (改用 localStorage 儲存，方便直接於畫面設定)
// ================================================================
let GAS_API_URL = localStorage.getItem('GAS_API_URL') || '';

function resetGasUrl() {
    localStorage.removeItem('GAS_API_URL');
    location.reload();
}

function saveGasUrlUi() {
    const url = document.getElementById('setting-gas-url').value.trim();
    if(url) {
        localStorage.setItem('GAS_API_URL', url);
        GAS_API_URL = url;
        Swal.fire('成功', 'API 網址已更新', 'success').then(() => location.reload());
    }
}

async function fetchAPI(action, data = {}) {
    if(!GAS_API_URL) {
        throw new Error('未設定 API URL');
    }
    try {
        const response = await fetch(GAS_API_URL, {
            method: 'POST',
            redirect: 'follow', // 處理 GAS CORS
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data })
        });
        const result = await response.json();
        if (result.status === 'success') return result.data;
        throw new Error(result.message);
    } catch (e) {
        throw new Error('伺服器連線失敗：' + e.message);
    }
}

const API = {
    getTasks:                  () => fetchAPI('getTasks'),
    getStudents:               t  => fetchAPI('getStudents', { taskName: t }),
    generateQuiz:              (n, t) => fetchAPI('generateQuiz', { weakNode: n, taskName: t }),
    submitQuizResult:          d  => fetchAPI('submitQuizResult', { payload: d }),
    verifyAdmin:               p  => fetchAPI('verifyAdmin', { pwd: p }),
    uploadTaskData:            (n, g, s, d, nd) => fetchAPI('uploadTaskData', { taskName: n, grade: g, subject: s, studentData: d, uniqueNodes: nd }),
    setupDatabase:             async () => Swal.fire('成功', await fetchAPI('setupDatabase'), 'success'),
    generateBatch:             (nodes, grade, subj, idx) => fetchAPI('generateBatch', { nodesArray: nodes, grade, subject: subj, batchIndex: idx }),
    generateBatchFromFolder:   (fid, nodes, grade, subj, idx, mode) => fetchAPI('generateBatchFromFolder', { folderId: fid, nodesArray: nodes, grade, subject: subj, batchIndex: idx, mode: mode }),
    scanFolder:                fid => fetchAPI('scanFolder', { folderId: fid }),
    getQuizSettings:           () => fetchAPI('getQuizSettings'),
    updateQuizSettings:        c  => fetchAPI('updateQuizSettings', { count: c }),
    updateFolderId:            fid => fetchAPI('updateFolderId', { folderId: fid }),
    getFolderId:               () => fetchAPI('getFolderId'),
    clearBankCache:            () => fetchAPI('clearBankCache'),
    getTaskResults:            t  => fetchAPI('getTaskResults', { taskName: t }),
    getQuestionErrorRates:     t  => fetchAPI('getQuestionErrorRates', { taskName: t }),
    analyzeClassWeakNodes:     t  => fetchAPI('analyzeClassWeakNodes', { taskName: t }),
    generateTeachingWorksheet: (nodes, grade, subj) => fetchAPI('generateTeachingWorksheet', { topNodes: nodes, grade, subject: subj })
};

// 全域狀態
let globalUniqueNodes = [], currentSource = 'ai', _allTasks = [];
let currentQuestions = [], currentIdx = 0, userAnswers = {}, quizTimer = null, secondsElapsed = 0, sigPad = null;
let _currentAnalysisGrade = '五年級', _currentAnalysisSubject = '數學';

window.onload = async () => {
    initCanvas();
    
    if (!GAS_API_URL) {
        const { value: url } = await Swal.fire({
            title: '首次使用設定',
            text: '請輸入您 Google Apps Script 的 Web App 網址',
            input: 'url',
            inputPlaceholder: 'https://script.google.com/.../exec',
            allowOutsideClick: false,
            allowEscapeKey: false,
            confirmButtonText: '儲存並連線'
        });
        if (url) {
            GAS_API_URL = url;
            localStorage.setItem('GAS_API_URL', url);
        } else {
            Swal.fire('錯誤', '必須設定 API 網址才能使用系統', 'error');
            return;
        }
    }

    Swal.fire({ title: '連線中...', text: '正在取得任務資料', didOpen: () => Swal.showLoading() });
    
    try {
        _allTasks = await API.getTasks();
        ['task-select', 'results-task-select', 'qerror-task-select', 'analysis-task-select'].forEach(id => {
            const sel = document.getElementById(id);
            if (!sel) return;
            sel.innerHTML = '<option value="">-- 選擇任務 --</option>';
            _allTasks.forEach(t => {
                const o = document.createElement('option');
                o.value = t.name; o.textContent = `${t.name} (${t.grade}·${t.subject})`;
                o.dataset.subject = t.subject; o.dataset.grade = t.grade;
                sel.appendChild(o);
            });
        });
        Swal.close();
    } catch(e) { 
        console.error(e);
        Swal.fire({
            title: '連線失敗',
            html: `無法取得資料，請確認 API 網址是否正確或具有正確權限。<br><br><button class="btn btn-outline-danger" onclick="resetGasUrl()">重新設定 API 網址</button>`,
            icon: 'error',
            showConfirmButton: false
        });
    }
};

function switchView(id) {
    ['view-login', 'view-admin', 'view-quiz'].forEach(v => document.getElementById(v).style.display = v === id ? 'block' : 'none');
    if(id === 'view-login') window.onload();
}

async function loginAdmin() {
    Swal.fire({ title: '驗證中', didOpen: () => Swal.showLoading() });
    try {
        if(await API.verifyAdmin(document.getElementById('admin-pwd').value)) {
            Swal.close(); switchView('view-admin');
            const s = await API.getQuizSettings(); document.getElementById('setting-quiz-count').value = s.quizCount;
            const fid = await API.getFolderId(); if(fid) document.getElementById('setting-folder-id').value = fid;
            document.getElementById('setting-gas-url').value = GAS_API_URL;
        } else Swal.fire('錯誤', '密碼不正確', 'error');
    } catch(e) { Swal.fire('錯誤', e.message, 'error'); }
}

async function saveSettings(action, inputId) {
    const val = document.getElementById(inputId).value;
    Swal.fire({ title: '儲存中', didOpen: () => Swal.showLoading() });
    try { Swal.fire('成功', await API[action](val), 'success'); } 
    catch(e) { Swal.fire('失敗', e.message, 'error'); }
}

function switchSource(src) {
    currentSource = src;
    document.getElementById('src-btn-ai').classList.remove('active');
    document.getElementById('src-btn-pdf').classList.remove('active');
    document.getElementById('src-btn-mixed').classList.remove('active');
    document.getElementById('src-btn-' + src).classList.add('active');
    document.getElementById('pdf-panel').style.display = (src === 'pdf' || src === 'mixed') ? 'block' : 'none';
}

async function scanPdfFolder() {
    const fId = document.getElementById('pdf-folder-id').value;
    if(!fId) return Swal.fire('錯誤', '請填寫 ID', 'warning');
    document.getElementById('folder-scan-result').style.display = 'block';
    document.getElementById('folder-scan-result').innerText = '掃描中...';
    try {
        const info = await API.scanFolder(fId);
        document.getElementById('folder-scan-result').innerText = `✅ 找到 ${info.count} 個 PDF`;
    } catch(e) { document.getElementById('folder-scan-result').innerText = `❌ ${e.message}`; }
}

function processExcel() {
    const file = document.getElementById('excel-file').files[0];
    const taskName = document.getElementById('new-task-name').value, grade = document.getElementById('task-grade').value, subject = document.getElementById('task-subject').value;
    if(!file || !taskName) return Swal.fire('錯誤', '請輸入名稱並選擇檔案', 'warning');
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            let extracted = [], nodes = new Set();
            for(let i=1; i<data.length; i++) {
                if(!data[i][1]) continue;
                let n = String(data[i][3]||'').trim();
                extracted.push({ seatNo: data[i][0], name: data[i][1], accuracy: data[i][2], weakNodes: n });
                if(/\d/.test(n)) nodes.add(n);
            }
            globalUniqueNodes = Array.from(nodes);
            Swal.fire({title:'上傳中', didOpen:()=>Swal.showLoading()});
            await API.uploadTaskData(taskName, grade, subject, extracted, globalUniqueNodes);
            Swal.fire('完成', '名單建立成功', 'success');
            if(globalUniqueNodes.length > 0) {
                document.getElementById('ai-generation-panel').style.display = 'block';
                document.getElementById('weak-count').innerText = globalUniqueNodes.length;
            }
        } catch(err) { Swal.fire('錯誤', err.message, 'error'); }
    };
    reader.readAsArrayBuffer(file);
}

async function triggerAIGeneration() {
    const grade = document.getElementById('task-grade').value, subject = document.getElementById('task-subject').value;
    const fId = document.getElementById('pdf-folder-id').value;
    if((currentSource === 'pdf' || currentSource === 'mixed') && !fId) return Swal.fire('錯誤', '請輸入資料夾 ID', 'warning');

    const panel = document.getElementById('ai-progress-panel'), bar = document.getElementById('ai-progress-bar'), log = document.getElementById('batch-log');
    panel.style.display = 'block'; bar.style.width = '0%'; log.innerHTML = '';
    
    try {
        let batchIndex = 0;
        while(true) {
            document.getElementById('progress-title').innerText = `第 ${batchIndex+1} 批次命題中...`;
            const res = (currentSource === 'pdf' || currentSource === 'mixed') 
                ? await API.generateBatchFromFolder(fId, globalUniqueNodes, grade, subject, batchIndex, currentSource) 
                : await API.generateBatch(globalUniqueNodes, grade, subject, batchIndex);
            
            bar.style.width = Math.round((res.current / res.total) * 100) + '%';
            log.innerHTML += `<div>✅ ${res.message}</div>`;
            if(res.done) break;
            batchIndex++;
        }
        Swal.fire('完成', '擴充完畢', 'success');
    } catch(e) { Swal.fire('失敗', e.message, 'error'); }
}

async function loadStudents() {
    const task = document.getElementById('task-select').value;
    const sel = document.getElementById('student-select');
    if(!task) { sel.disabled = true; return; }
    sel.innerHTML = '<option>載入中...</option>';
    const students = await API.getStudents(task);
    sel.disabled = false; sel.innerHTML = '<option value="">-- 選擇姓名 --</option>';
    students.forEach(s => { const o = document.createElement('option'); o.value = JSON.stringify(s); o.textContent = s.name; sel.appendChild(o); });
}

async function startQuiz() {
    const val = document.getElementById('student-select').value;
    if(!val) return Swal.fire('錯誤', '請選擇姓名', 'warning');
    const student = JSON.parse(val), taskName = document.getElementById('task-select').value;
    document.getElementById('quiz-student-name').innerText = student.name;
    
    Swal.fire({ title: '抓取題庫中', didOpen: () => Swal.showLoading() });
    currentQuestions = await API.generateQuiz(student.weakNode, taskName);
    Swal.close();
    if(!currentQuestions.length) return Swal.fire('提示', '題庫無題目', 'info');

    currentIdx = 0; userAnswers = {}; secondsElapsed = 0;
    quizTimer = setInterval(() => {
        secondsElapsed++;
        document.getElementById('timer').innerText = `${String(Math.floor(secondsElapsed/60)).padStart(2,'0')}:${String(secondsElapsed%60).padStart(2,'0')}`;
    }, 1000);
    renderQuestion(); switchView('view-quiz'); setTimeout(resizeCanvas, 100);
}

function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function renderQuestion() {
    const q = currentQuestions[currentIdx];
    let html = `<div class="text-muted small mb-2">第 ${currentIdx+1}/${currentQuestions.length} 題</div><h5 class="mb-4">${q.text}</h5>`;
    if(q.type === 'single') {
        q.options.forEach((opt, i) => {
            const chk = userAnswers[q.id] === opt ? 'checked' : '';
            html += `<label class="option-btn ${chk ? 'selected':''}"><input type="radio" class="d-none" name="q" value="${escapeHtml(opt)}" ${chk} onchange="userAnswers['${q.id}']='${escapeHtml(opt)}';renderQuestion()"><span class="option-prefix">${['A','B','C','D'][i]||i}</span>${escapeHtml(opt)}</label>`;
        });
    } else {
        html += `<input type="text" class="fill-input" value="${escapeHtml(userAnswers[q.id]||'')}" oninput="userAnswers['${q.id}']=this.value">`;
    }
    document.getElementById('question-container').innerHTML = html;
    document.getElementById('quiz-progress').style.width = `${(currentIdx / currentQuestions.length) * 100}%`;
    document.getElementById('btn-prev').disabled = currentIdx === 0;
    document.getElementById('btn-next').style.display = currentIdx === currentQuestions.length - 1 ? 'none' : 'block';
    document.getElementById('btn-submit').style.display = currentIdx === currentQuestions.length - 1 ? 'block' : 'none';
}

function navQuestion(dir) { currentIdx += dir; renderQuestion(); }

async function submitQuiz() {
    clearInterval(quizTimer);
    let score = 0, details = [];
    currentQuestions.forEach(q => {
        const uAns = (userAnswers[q.id]||'').replace(/\s/g,''), cAns = (q.answer||'').replace(/\s/g,'');
        const isCorrect = uAns === cAns;
        if(isCorrect) score += 100 / currentQuestions.length;
        details.push({ id: q.id, userAns: uAns, correctAns: q.displayAnswer || q.answer, questionText: q.text, isCorrect });
    });
    
    await API.submitQuizResult({ taskName: document.getElementById('task-select').value, seatNo: JSON.parse(document.getElementById('student-select').value).seatNo, name: document.getElementById('quiz-student-name').innerText, score: Math.round(score), timeSpent: secondsElapsed, details });
    Swal.fire({ title: `得分：${Math.round(score)}`, icon: score>=60?'success':'info', confirmButtonText: '回首頁' }).then(() => switchView('view-login'));
}

async function loadAdminResults() {
    const t = document.getElementById('results-task-select').value, c = document.getElementById('results-table-container');
    if(!t) return c.innerHTML = '';
    c.innerHTML = '載入中...';
    const res = await API.getTaskResults(t);
    let html = '<table class="table mt-3"><thead><tr><th>座號</th><th>姓名</th><th>分數</th><th>時間</th></tr></thead><tbody>';
    res.forEach(r => html += `<tr><td>${escapeHtml(r.seatNo)}</td><td>${escapeHtml(r.name)}</td><td>${r.score}</td><td>${r.timeSpent}s</td></tr>`);
    c.innerHTML = html + '</tbody></table>';
}

async function loadQuestionErrors() {
    const t = document.getElementById('qerror-task-select').value, c = document.getElementById('qerror-container');
    if(!t) return c.innerHTML = '';
    c.innerHTML = '載入中...';
    const res = await API.getQuestionErrorRates(t);
    let html = '<table class="table mt-3"><thead><tr><th>題目</th><th>錯誤率</th></tr></thead><tbody>';
    res.forEach(r => html += `<tr><td class="small">${escapeHtml(r.questionText)}</td><td>${r.wrongRate}%</td></tr>`);
    c.innerHTML = html + '</tbody></table>';
}

async function loadClassAnalysis() {
    const t = document.getElementById('analysis-task-select').value, c = document.getElementById('analysis-container');
    if(!t) return c.innerHTML = '';
    c.innerHTML = '載入中...';

    const taskOpt = document.getElementById('analysis-task-select').selectedOptions[0];
    _currentAnalysisSubject = taskOpt ? taskOpt.dataset.subject || '數學' : '數學';
    _currentAnalysisGrade   = taskOpt ? taskOpt.dataset.grade || '五年級' : '五年級';

    const res = await API.analyzeClassWeakNodes(t);
    let html = '<div class="mt-3">';
    res.forEach(r => html += `<div class="card p-3 mb-2"><b>${escapeHtml(r.node)}</b> 錯誤率: ${r.wrongRate}% <br><small>答錯學生: ${escapeHtml(r.students.join(', '))}</small></div>`);
    c.innerHTML = html + '</div>';

    window._topWrongNodes = res.slice(0, 3).map(a => a.node);
    document.getElementById('worksheet-container').style.display = 'block';
}

async function generateWorksheet() {
    if (!window._topWrongNodes || !window._topWrongNodes.length) return Swal.fire('提示', '請先完成分析', 'info');
    const wsContent = document.getElementById('worksheet-content');
    wsContent.innerHTML = '<p class="text-center text-muted py-3"><i class="fa-solid fa-spinner fa-spin"></i> AI 正在生成教學講義...</p>';
    document.getElementById('worksheet-container').scrollIntoView({ behavior: 'smooth' });
    try {
        const questions = await API.generateTeachingWorksheet(window._topWrongNodes, _currentAnalysisGrade, _currentAnalysisSubject);
        window._currentWorksheetQuestions = questions;
        wsContent.innerHTML = '<div class="alert alert-success text-center">講義生成完畢！請點擊上方按鈕選擇列印「教師版」或「學生版」。</div>';
    } catch (err) { wsContent.innerHTML = `<p class="text-danger">生成失敗：${escapeHtml(err.message)}</p>`; }
}

function buildPrintableHtml(questions, grade, nodes, subject, isTeacher) {
    const today = new Date().toLocaleDateString('zh-TW'), groups = {};
    questions.forEach(q => { const n = q.node || '其他'; if (!groups[n]) groups[n] = []; groups[n].push(q); });
    let idx = 0, nodeBlocks = '';
    Object.entries(groups).forEach(([node, qs]) => {
        let problems = '';
        qs.forEach(q => { 
            idx++; 
            let ansHtml = isTeacher ? `<span style="color:#1b5e20;font-size:8.5pt;margin-left:6pt;">（正解：${escapeHtml(q.answer||'')}）</span>` : '';
            let hintHtml = isTeacher ? `<div class="ws-hint">💡 提示：${escapeHtml(q.hint||'')}</div>` : '';
            problems += `<div class="ws-problem-item"><div class="ws-step">① ${escapeHtml(q.step||'')}</div><div class="ws-qtext">${idx}. ${escapeHtml(q.text||'')}</div><table class="ws-answer-row"><tr><td width="52%">${subject==='國語'?'作答：':'列式：'}<span class="ws-blank">&nbsp;</span></td><td>答案：<span class="ws-blank">&nbsp;</span>${ansHtml}</td></tr></table>${hintHtml}</div>`; 
        });
        nodeBlocks += `<div class="ws-node-block"><div class="ws-node-title">📌 知識節點：${escapeHtml(node)}</div><div class="ws-node-body">${problems}</div></div>`;
    });
    let titleStr = isTeacher ? "差異化補救教學講義 (教師版)" : "差異化補救教學練習卷 (學生版)";
    return `<div class="ws-header"><h1>車城國小 ${escapeHtml(grade)} ${escapeHtml(subject)}科 ${titleStr}</h1><div class="ws-meta">弱點節點：${nodes.map(escapeHtml).join('、')}　　出卷日期：${today}</div><table><tr><td>班級：<span class="ws-blank">&nbsp;</span></td><td>座號：<span class="ws-blank">&nbsp;</span></td><td>姓名：<span class="ws-blank">&nbsp;</span></td><td>得分：<span class="ws-blank">&nbsp;</span></td></tr></table></div>${nodeBlocks}<div class="ws-footer">✦ 本練習卷由 AI 根據全班共同弱點自動生成，僅供課堂輔助教學使用 ✦</div>`;
}

function printWorksheet(isTeacher) {
    if (!window._currentWorksheetQuestions) {
        generateWorksheet().then(() => { if(window._currentWorksheetQuestions) openPrintWindow(isTeacher); });
        return;
    }
    openPrintWindow(isTeacher);
}

function openPrintWindow(isTeacher) {
    const printHtml = buildPrintableHtml(window._currentWorksheetQuestions, _currentAnalysisGrade, window._topWrongNodes, _currentAnalysisSubject, isTeacher);
    const css = '@page{size:A4 portrait;margin:15mm 18mm 15mm 18mm;}*{box-sizing:border-box;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;font-size:11pt;color:#000;background:#fff;margin:0;padding:0;}.ws-node-block{page-break-inside:avoid;margin-bottom:16pt;}.ws-problem-item{page-break-inside:avoid;margin-bottom:10pt;}.ws-header{text-align:center;margin-bottom:12pt;padding-bottom:8pt;border-bottom:2pt solid #1565c0;}.ws-header h1{font-size:15pt;font-weight:bold;color:#1565c0;margin:0 0 4pt;}.ws-header .ws-meta{font-size:9pt;color:#444;margin-bottom:6pt;}.ws-header table{width:100%;margin:0 auto;font-size:10.5pt;border-collapse:collapse;}.ws-header td{padding:2pt 8pt;}.ws-blank{display:inline-block;border-bottom:1.5pt solid #000;min-height:14pt;min-width:80pt;}.ws-node-title{background:#1565c0!important;color:#fff!important;padding:5pt 10pt;border-radius:4pt 4pt 0 0;font-size:11.5pt;font-weight:bold;}.ws-node-body{border:1.5pt solid #1565c0;border-top:none;border-radius:0 0 4pt 4pt;padding:10pt 12pt 2pt;}.ws-step{background:#fff8e1!important;border-left:3pt solid #f9a825!important;padding:4pt 8pt;font-size:9pt;color:#555;margin-bottom:6pt;}.ws-qtext{font-size:11.5pt;font-weight:bold;margin-bottom:7pt;}.ws-answer-row{width:100%;border-collapse:collapse;font-size:10pt;color:#333;margin-bottom:5pt;}.ws-answer-row td{padding:2pt 0;vertical-align:bottom;}.ws-hint{background:#e3f2fd!important;border-left:3pt solid #1976d2!important;padding:4pt 8pt;font-size:9pt;color:#0d47a1;margin-bottom:10pt;}.ws-footer{text-align:center;font-size:8pt;color:#999;margin-top:10pt;border-top:0.5pt solid #ddd;padding-top:5pt;}';
    const win = window.open('', '_blank', 'width=860,height=700');
    if (!win) { Swal.fire('提示', '請允許瀏覽器開啟彈出視窗', 'warning'); return; }
    win.document.open();
    win.document.write('<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>車城國小補救教學練習卷</title><style>' + css + '</style></head><body>' + printHtml + '</body></html>');
    win.document.close();
    setTimeout(() => { win.focus(); win.print(); }, 800);
}

// Canvas
function initCanvas() { sigPad = new SignaturePad(document.getElementById('signature-pad')); }
function resizeCanvas() { const cvs = document.getElementById('signature-pad'), r = Math.max(window.devicePixelRatio||1,1); cvs.width = cvs.offsetWidth*r; cvs.height = cvs.offsetHeight*r; cvs.getContext('2d').scale(r,r); sigPad.clear(); }
function toggleCanvas() { const p = document.getElementById('draw-panel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; if(p.style.display === 'block') resizeCanvas(); }
</script>
